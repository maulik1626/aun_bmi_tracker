name: aun_bmi_tracker
description: "AUN Creations — BMI Calculator & Tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Local Storage
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3

  # UI & Charts
  fl_chart: ^0.68.0
  lottie: ^3.1.2
  cupertino_icons: ^1.0.8

  # Ads
  google_mobile_ads: ^5.1.0

  # Firebase (add back when Firebase project is configured)
  # firebase_core: ^3.1.0
  # firebase_analytics: ^11.1.0
  # firebase_crashlytics: ^4.0.3

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  logger: ^2.3.0
  share_plus: ^9.0.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  build_runner: ^2.4.9
  flutter_lints: ^4.0.0
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
